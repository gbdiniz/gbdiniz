# =============================================================================
#  📊 GitHub Profile Metrics — lowlighter/metrics
#  Arquivo: .github/workflows/metrics.yml
#
#  Plugins ativos:
#    ✅ lines        — Telemetria de refatoração (adições/remoções)
#    ✅ habits       — Prova de rotina e disciplina de commits
#    ✅ languages    — Detalhamento técnico da stack
#    ✅ achievements — Validação de competências e marcos
#    ✅ anilist      — Integração de identidade visual/estética
#
#  Push destino : branch `main`, pasta `metrics/`
#  Segurança    : token via ${{ secrets.METRICS_TOKEN }}
# =============================================================================

name: 📊 GitHub Metrics

on:
  # ── Agendamento automático: todo dia às 00:30 UTC ──────────────────────────
  schedule:
    - cron: "30 0 * * *"

  # ── Gatilho manual via GitHub UI ou API ───────────────────────────────────
  workflow_dispatch:

# ── Permissão obrigatória para commitar os SVGs no repositório ────────────────
permissions:
  contents: write

jobs:

  # ============================================================================
  #  JOB 1 — Header / Estatísticas gerais
  #  Saída: metrics/header.svg
  # ============================================================================
  metrics-header:
    name: 🏷️ Header & Stats
    runs-on: ubuntu-latest

    steps:
      - name: Header — estatísticas gerais do perfil
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/header.svg

          # Configurações visuais
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo

          # Sem plugins extras neste job — foco no header limpo
          plugin_lines: no
          plugin_habits: no
          plugin_languages: no
          plugin_achievements: no
          plugin_anilist: no

  metrics-calendar:
    name: 🏷️ Calendar
    runs-on: ubuntu-latest

    steps:
    - name: Half-year calendar
      uses: lowlighter/metrics@latest
      with:
        filename: metrics/isocalendar.svg
        token: ${{ secrets.METRICS_TOKEN }}
        base: ""
        plugin_isocalendar: yes
